name: Release

on:
  push:
    tags:
      - publish-alpha/**
      - publish-release/**

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  publish-alpha:
    name: Publish alpha package
    if: startsWith(github.ref_name, 'publish-alpha/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Show toolchain versions
        run: |
          node --version
          npm --version
          bun --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify publishable package
        run: bun run verify:ci

      - name: Bump alpha version for this run
        run: bun run bump:alpha:ci

      - name: Publish alpha to npm
        run: bun run release:alpha:ci
        env:
          NPM_CONFIG_PROVENANCE: true

  release:
    name: Publish stable package
    if: startsWith(github.ref_name, 'publish-release/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Show toolchain versions
        run: |
          node --version
          npm --version
          bun --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify publishable package
        run: bun run verify:ci

      - name: Ensure stable version
        run: |
          version=$(node -p "require('./packages/vop/package.json').version")
          if [[ "$version" == *-* ]]; then
            echo "Stable publish tags require a non-prerelease version, received $version."
            exit 1
          fi

      - name: Publish stable to npm
        run: bun run release
        env:
          NPM_CONFIG_PROVENANCE: true
