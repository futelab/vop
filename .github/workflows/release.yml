name: Release

on:
  push:
    branches:
      - alpha
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  publish-alpha:
    name: Publish alpha package
    if: github.event_name == 'push' && github.ref_name == 'alpha'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify publishable package
        run: bun run verify:ci

      - name: Publish alpha to npm
        run: bun run release:alpha:ci

  release:
    name: Version or publish stable package
    if: github.event_name == 'workflow_dispatch' && github.ref_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify publishable package
        run: bun run verify:ci

      - name: Decide whether stable release should run
        id: stable_gate
        run: |
          version=$(node -p "require('./packages/vop/package.json').version")
          has_changesets=false
          if find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | grep -q .; then
            has_changesets=true
          fi

          if [[ "$version" == *-* && "$has_changesets" != "true" ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping stable release for prerelease version $version without pending changesets."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release PR or publish to npm
        if: steps.stable_gate.outputs.should_run == 'true'
        uses: changesets/action@v1
        with:
          version: bun run version:package
          publish: bun run release
          commit: "Prepare stable npm release via Changesets"
          title: "Prepare stable npm release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
